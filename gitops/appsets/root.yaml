apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devsecops-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/GimhanDissanayake/DevSecOps-AWS.git
    targetRevision: main
    path: gitops/applications
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
